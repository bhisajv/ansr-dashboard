<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANSR Machine Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f5f6;
    --surface:  #ffffff;
    --border:   #d4d4d8;
    --text:     #111113;
    --muted:    #71717a;
    --teal:     #0d9488;
    --teal-light: rgba(13,148,136,0.08);
    --teal-border: rgba(13,148,136,0.25);
    --red:      #dc2626;
    --red-light: rgba(220,38,38,0.07);
    --red-border: rgba(220,38,38,0.25);
    --amber:    #d97706;
    --amber-light: rgba(217,119,6,0.07);
    --amber-border: rgba(217,119,6,0.25);
    --font: 'Inter', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    margin: 0 auto;
  }

  @media (max-width: 480px) {
    .card { border-radius: 12px; max-width: 100%; }
    html, body { padding: 16px 12px; align-items: flex-start; padding-top: 40px; }
    .card-header { padding: 20px 20px 16px; }
    .actions { padding: 0 16px 20px; }
    .machine-info { margin: 16px 16px 0; }
    .section-label { padding: 16px 16px 8px; }
    .card-footer { padding: 12px 16px; }
  }

  /* Header */
  .card-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    background: #f0fdfa;
    border: 1px solid var(--teal-border);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--teal);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Machine info pill */
  .machine-info {
    margin: 20px 24px 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .machine-icon {
    width: 32px;
    height: 32px;
    background: var(--teal-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--teal);
    flex-shrink: 0;
  }

  .machine-icon svg { width: 16px; height: 16px; }

  .machine-details {
    min-width: 0;
  }

  .machine-id {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .machine-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 20px 24px 10px;
  }

  /* Action buttons */
  .actions {
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 12px;
    border: 1.5px solid transparent;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    background: var(--surface);
    width: 100%;
  }

  .action-btn:active { transform: scale(0.98); }

  .action-btn:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

  /* Log Usage — teal */
  .btn-usage {
    background: var(--teal-light);
    border-color: var(--teal-border);
  }

  .btn-usage:hover { background: rgba(13,148,136,0.13); }

  .btn-usage .btn-icon { background: var(--teal); }

  .btn-usage .btn-title { color: var(--teal); }

  /* Report Issue — red */
  .btn-report {
    background: var(--red-light);
    border-color: var(--red-border);
  }

  .btn-report:hover { background: rgba(220,38,38,0.11); }

  .btn-report .btn-icon { background: var(--red); }

  .btn-report .btn-title { color: var(--red); }



  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #fff;
  }

  .btn-icon svg { width: 18px; height: 18px; }

  .btn-text { flex: 1; min-width: 0; }

  .btn-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.1px;
  }

  .btn-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .btn-arrow {
    color: var(--muted);
    flex-shrink: 0;
  }

  .btn-arrow svg { width: 16px; height: 16px; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 24px 14px;
  }

  /* Footer */
  .card-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  .card-footer span {
    color: var(--teal);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <img src="sila-logo.png"
         onerror="this.style.display='none';document.getElementById('silaFallback').style.display='flex'"
         style="height:40px;width:auto;object-fit:contain" alt="SILA">
    <div class="logo-mark" id="silaFallback" style="display:none">SILA</div>
    <div class="header-text">
      <h1>ANSR Machine Portal</h1>
      <p>Select an action for this machine</p>
    </div>
  </div>



  <div class="section-label">What would you like to do?</div>

  <div class="actions">

    <!-- Log Usage -->
    <a class="action-btn btn-usage" id="btnUsage" href="https://docs.google.com/forms/d/e/1Fk1Mhwurd26D8KOq7SOTzYZDVEmK0C2IwWZJuEtN7WY/viewform" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 15"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-title">Log Usage</div>
        <div class="btn-sub">Record a start or stop session</div>
      </div>
      <div class="btn-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

    <!-- Report Issue -->
    <a class="action-btn btn-report" id="btnReport" href="#" target="_blank">
      <div class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-title">Report Issue</div>
        <div class="btn-sub">Machine not working or needs attention</div>
      </div>
      <div class="btn-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>



  </div>

  <div class="card-footer">
    Powered by <span>SILA</span> · ANSR Facility Management
  </div>

</div>

<script>
  const params      = new URLSearchParams(window.location.search);
  const machineId   = params.get('id')       || '';
  const machineDesc = params.get('desc')     || '';
  const siteCode    = params.get('site')     || '';
  const siteName    = params.get('sitename') || '';

  const BASE_FORM         = 'https://docs.google.com/forms/d/e/1FAIpQLSdjeOBYHVdjqTl9PaJ76pXPPpxHZtKn9n90a6vfKgvI0UboDQ/viewform';
  const REPORT_ISSUE_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLScQtv7vUOfEX6URbVhlazKK4YeiGFKAIFiuoTTGxQVV6VTsLA/viewform';

  // Confirmed field entry IDs
  const F_MACHINE_ID   = 'entry.1876283819';
  const F_SITE_CODE    = 'entry.655641636';
  const F_SITE_NAME    = 'entry.567212527';
  const F_MACHINE_DESC = 'entry.1244799866';

  function buildFormUrl(base) {
    const p = new URLSearchParams({ usp: 'pp_url' });
    if (machineId)   p.set(F_MACHINE_ID,   machineId);
    if (siteCode)    p.set(F_SITE_CODE,    siteCode);
    if (siteName)    p.set(F_SITE_NAME,    siteName);
    if (machineDesc) p.set(F_MACHINE_DESC, machineDesc);
    return base + '?' + p.toString();
  }

  document.getElementById('btnUsage').href  = buildFormUrl(BASE_FORM);
  document.getElementById('btnReport').href = REPORT_ISSUE_FORM !== '#'
    ? buildFormUrl(REPORT_ISSUE_FORM)
    : '#';
</script>

</body>
</html>
